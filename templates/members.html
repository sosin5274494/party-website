{% extends "base.html" %}

{% block content %}
<h1 style="font-size: 32px; margin-bottom: 30px;">👥 成员展示</h1>

<div class="grid grid-3">
    {% for user in users %}
        <a href="{{ url_for('member_detail', user_id=user.id) }}" style="text-decoration: none; color: inherit;">
            <div class="card member-card">
                <img src="{{ user.avatar }}" alt="{{ user.nickname }}" class="member-avatar">
                <h3 class="member-name">{{ user.nickname }}</h3>
                <p class="member-bio">{{ user.bio or '还没有介绍' }}</p>
                
                <div class="ability-grid">
                    <div class="ability-item">
                        <span class="ability-label">酒量</span>
                        <span class="ability-value">{{ user.alcohol_level }}</span>
                    </div>
                    <div class="ability-item">
                        <span class="ability-label">体重</span>
                        <span class="ability-value">{{ user.weight }}kg</span>
                    </div>
                    <div class="ability-item">
                        <span class="ability-label">受欢迎</span>
                        <span class="ability-value">{{ user.popularity }}</span>
                    </div>
                </div>
            </div>
        </a>
    {% endfor %}
</div>
{% endblock %}

{% block title %}成员列表 - 阳光聚会圈{% endblock %}
