{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h1 class="auth-title">🔑 登录</h1>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" required placeholder="请输入用户名">
            </div>
            
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-input" required placeholder="请输入密码">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">登录</button>
        </form>
        
        <p style="text-align: center; margin-top: 25px; color: #6B5344;">
            还没有账号？<a href="{{ url_for('register') }}" style="color: #FF9500;">立即注册</a>
        </p>
    </div>
</div>
{% endblock %}

{% block title %}登录 - 阳光聚会圈{% endblock %}
